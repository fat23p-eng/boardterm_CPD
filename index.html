<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ระบบตรวจสอบวาระกรรมการสหกรณ์</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#F5F5F5;color:#1a1a1a;font-size:14px}
a{color:inherit}
/* Layout */
.app-wrap{display:flex;min-height:100vh}
.sidebar{width:220px;background:#1C2B4A;flex-shrink:0;display:flex;flex-direction:column}
.sidebar-logo{padding:1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar-logo .app-name{font-size:14px;font-weight:600;color:#fff;line-height:1.4}
.sidebar-logo .app-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
.nav-section{font-size:10px;color:rgba(255,255,255,.4);padding:12px 14px 4px;letter-spacing:.5px;text-transform:uppercase}
.nav-item{padding:9px 14px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:8px;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:#4A9EFF}
.nav-item svg{opacity:.7;flex-shrink:0}
.nav-item.active svg{opacity:1}
.sidebar-footer{margin-top:auto;padding:12px 14px;border-top:1px solid rgba(255,255,255,.1)}
.user-info{font-size:12px;color:rgba(255,255,255,.6);margin-bottom:8px}
.user-info strong{color:#fff;display:block;font-size:13px}
.main-wrap{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:#fff;border-bottom:1px solid #E8E8E8;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.page-title{font-size:16px;font-weight:600;color:#1a1a1a}
.content{padding:20px;flex:1}
/* Cards */
.card{background:#fff;border:1px solid #E8E8E8;border-radius:10px;padding:16px 20px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px;color:#1a1a1a}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.stat{background:#F8F9FA;border-radius:8px;padding:12px 14px;border:1px solid #EAEAEA}
.stat-label{font-size:11px;color:#666;margin-bottom:3px}
.stat-value{font-size:22px;font-weight:700;color:#1a1a1a}
.stat-value.ok{color:#2E7D32}
.stat-value.warn{color:#E65100}
.stat-value.bad{color:#C62828}
/* Buttons */
.btn{padding:7px 14px;font-size:12px;border:1px solid #D0D0D0;border-radius:6px;background:#fff;color:#333;cursor:pointer;transition:.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#F5F5F5;border-color:#B0B0B0}
.btn-primary{background:#1C2B4A;border-color:#1C2B4A;color:#fff}
.btn-primary:hover{background:#253561}
.btn-success{background:#E8F5E9;border-color:#81C784;color:#2E7D32}
.btn-danger{background:#FFEBEE;border-color:#EF9A9A;color:#C62828}
.btn-warning{background:#FFF8E1;border-color:#FFD54F;color:#E65100}
.btn-sm{padding:4px 9px;font-size:11px}
/* Forms */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.form-row.one{grid-template-columns:1fr}
.form-group label{font-size:11px;color:#555;display:block;margin-bottom:3px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:7px 10px;font-size:13px;border:1px solid #D0D0D0;border-radius:6px;background:#fff;color:#1a1a1a;font-family:'Sarabun',sans-serif}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#4A9EFF}
.form-group textarea{resize:vertical;min-height:80px}
/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-weight:600;font-size:11px;color:#555;padding:8px 10px;border-bottom:2px solid #EAEAEA;white-space:nowrap;background:#F8F9FA}
td{padding:8px 10px;border-bottom:1px solid #F0F0F0;color:#1a1a1a;vertical-align:middle}
tr:hover td{background:#F9FAFB}
/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;white-space:nowrap}
.b-ok{background:#E8F5E9;color:#2E7D32}
.b-warn{background:#FFF8E1;color:#E65100}
.b-bad{background:#FFEBEE;color:#C62828}
.b-gray{background:#F5F5F5;color:#666}
.b-blue{background:#E3F2FD;color:#1565C0}
.b-purple{background:#F3E5F5;color:#6A1B9A}
.b-admin{background:#EDE7F6;color:#4527A0}
/* Term chips */
.chip{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.c11{background:#E3F2FD;color:#1565C0}
.c12{background:#E8F5E9;color:#2E7D32}
.c21{background:#FFF8E1;color:#E65100}
.c22{background:#FFEBEE;color:#C62828}
.csub{background:#F3E5F5;color:#6A1B9A}
.cbrk{background:#F5F5F5;color:#666}
/* Progress */
.progress{height:5px;border-radius:3px;background:#EAEAEA;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
/* Alerts */
.alert{padding:10px 14px;border-radius:7px;font-size:12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start;border:1px solid transparent}
.alert-danger{background:#FFEBEE;color:#C62828;border-color:#FFCDD2}
.alert-warn{background:#FFF8E1;color:#E65100;border-color:#FFE082}
.alert-info{background:#E3F2FD;color:#1565C0;border-color:#90CAF9}
.alert-ok{background:#E8F5E9;color:#2E7D32;border-color:#A5D6A7}
/* Toolbar */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.search-input{padding:7px 10px;font-size:13px;border:1px solid #D0D0D0;border-radius:6px;background:#fff;color:#1a1a1a;min-width:200px;flex:1;max-width:280px}
.search-input:focus{outline:none;border-color:#4A9EFF}
/* Modal */
.modal-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-backdrop.show{display:flex}
.modal{background:#fff;border-radius:12px;padding:20px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #EAEAEA}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #EAEAEA}
/* Login */
.login-page{min-height:100vh;background:#F0F4F8;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-box{background:#fff;border-radius:14px;padding:2rem;width:100%;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.login-logo{text-align:center;margin-bottom:1.5rem}
.login-logo .title{font-size:18px;font-weight:700;color:#1C2B4A;margin-bottom:4px}
.login-logo .sub{font-size:12px;color:#888}
/* Timeline */
.timeline-item{padding:10px 0;border-bottom:1px solid #F0F0F0;display:flex;gap:12px}
.timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot-ok{background:#4CAF50}
.dot-warn{background:#FF9800}
.dot-bad{background:#F44336}
.dot-gray{background:#9E9E9E}
/* Loading */
.loading{text-align:center;padding:2rem;color:#888;font-size:13px}
.empty{text-align:center;padding:2rem;color:#999;font-size:13px}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#323232;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .form-row{grid-template-columns:1fr}
  .form-row.three{grid-template-columns:1fr}
}
</style>

<script>
// ============================================================
//  GOOGLE SCRIPT MOCK (สำหรับทดสอบนอก Apps Script)
//  เมื่อ deploy ใน Apps Script แล้ว บล็อกนี้จะไม่ทำงาน
// ============================================================
// ============================================================
//  CONFIG — ใส่ URL ของ Apps Script Web App ที่นี่
//  หลัง Deploy: Deploy → New Deployment → Web App → copy URL
// ============================================================
var GAS_API_URL = '';  // ← วาง URL Apps Script ตรงนี้ เช่น 'https://script.google.com/macros/s/XXXX/exec'

// ============================================================
//  GAS() — universal caller
//  ทำงานแบบเดียวกับ GAS('login').withSuccessHandler(fn).action(args)
//  แต่ switch อัตโนมัติระหว่าง fetch() (GitHub Pages) กับ google.script.run (GAS)
// ============================================================
function GAS(action) {
  var _s = null, _f = null;

  function execute(args) {
    var s = _s, f = _f;

    // โหมด fetch() → Apps Script API (GitHub Pages + GAS_API_URL)
    if (GAS_API_URL && typeof google === 'undefined') {
      fetch(GAS_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: action, args: args })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) { if (s) s(data); })
      .catch(function(err) { if (f) f(err); else console.error('[GAS fetch]', err); });
      return;
    }

    // โหมด google.script.run (deploy บน GAS โดยตรง)
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      var runner = google.script.run;
      if (s) runner = runner.withSuccessHandler(s);
      if (f) runner = runner.withFailureHandler(f);
      if (typeof runner[action] === 'function') {
        runner[action].apply(runner, args);
      } else {
        if (f) f(new Error('ไม่พบฟังก์ชัน: ' + action));
      }
      return;
    }

    // โหมด Demo (ไม่มี GAS_API_URL และไม่ใช่ GAS)
    setTimeout(function() {
      try {
        if (!MOCK_FNS[action]) throw new Error('ไม่พบ mock: ' + action);
        var result = MOCK_FNS[action].apply(null, args);
        if (s) s(result);
      } catch(e) {
        if (f) f(e); else console.error('[GAS mock]', e);
      }
    }, 60);
  }

  // obj รองรับทั้ง .call(args) และ .anyFunctionName(args)
  var obj = new Proxy({
    withSuccessHandler: function(fn) { _s = fn; return obj; },
    withFailureHandler: function(fn) { _f = fn; return obj; },
    call: function() {
      execute(Array.prototype.slice.call(arguments));
    }
  }, {
    get: function(target, prop) {
      if (prop in target) return target[prop];
      // รองรับ .getCoops(token), .login(u,p) ฯลฯ โดยตรง
      return function() {
        execute(Array.prototype.slice.call(arguments));
      };
    }
  });

  return obj;
}

//  MOCK DATA (ใช้เมื่อไม่มี GAS_API_URL)
// ============================================================

];
var MOCK_USERS = [
  {id:'U001',username:'admin',name:'ผู้ดูแลระบบ',role:'admin',coopId:'',active:true},
  {id:'U002',username:'officer1',name:'นาง สมหญิง ดีใจ',role:'officer',coopId:'C01',active:true},
  {id:'U003',username:'officer2',name:'นาย วิชัย มั่งมี',role:'officer',coopId:'C02',active:true},

  {ts:'2025-03-10 09:00',userId:'officer1',action:'เพิ่มกรรมการ',detail:'นางสาว ง ใจดี (C01)'},
  {ts:'2025-01-05 14:30',userId:'admin',action:'แก้ไขข้อมูล',detail:'นาย ค รักดี (C01)'},
];
var _mockSessions = {
  'demo-admin':    {role:'admin',   coopId:''},
  'demo-officer1': {role:'officer', coopId:'C01'},
  'demo-officer2': {role:'officer', coopId:'C02'},

var _mockSeq = 100;

function _mockGetSess(t) { return _mockSessions[t] || null; }

var MOCK_FNS = {
  login: function(u, p) {
    var map = {
      admin:    {id:'U001',name:'ผู้ดูแลระบบ',role:'admin',coopId:''},
      officer1: {id:'U002',name:'นาง สมหญิง ดีใจ',role:'officer',coopId:'C01'},

      var tok = 'demo-'+u;
      _mockSessions[tok] = {role:map[u].role, coopId:map[u].coopId};
      return {ok:true, token:tok, user:map[u]};
    }
    return {ok:false, error:'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง\n(Demo: admin/admin หรือ officer1/1234)'};
  },
  logout: function() { return {ok:true}; },
  getCoops: function(t) {
    var s = _mockGetSess(t); if (!s) return {ok:false,error:'session หมดอายุ'};
    var d = s.role==='admin' ? MOCK_COOPS : MOCK_COOPS.filter(function(c){return c.id===s.coopId;});
    return {ok:true, data:JSON.parse(JSON.stringify(d))};
  },
  getBoards: function(t) {
    var s = _mockGetSess(t); if (!s) return {ok:false,error:'session หมดอายุ'};
    var d = s.role==='admin' ? MOCK_BOARDS : MOCK_BOARDS.filter(function(b){return b.coopId===s.coopId;});
    return {ok:true, data:JSON.parse(JSON.stringify(d))};
  },
  addBoard: function(t, b) {
    b.id = 'BM'+Date.now()+(_mockSeq++);
    MOCK_BOARDS.push(JSON.parse(JSON.stringify(b)));
    MOCK_AUDIT.unshift({ts:new Date().toLocaleString('th'),userId:'demo',action:'เพิ่มกรรมการ',detail:b.name});
    return {ok:true, id:b.id};
  },
  updateBoard: function(t, b) {
    var i = MOCK_BOARDS.findIndex(function(x){return x.id===b.id;});
    if (i>=0) { MOCK_BOARDS[i]=JSON.parse(JSON.stringify(b)); MOCK_AUDIT.unshift({ts:new Date().toLocaleString('th'),userId:'demo',action:'แก้ไข',detail:b.name}); }
    return {ok:true};
  },
  deleteBoard: function(t, id) {
    var b = MOCK_BOARDS.find(function(x){return x.id===id;});
    for (var i=MOCK_BOARDS.length-1;i>=0;i--){ if(MOCK_BOARDS[i].id===id){ MOCK_BOARDS.splice(i,1); break; } }
    if (b) MOCK_AUDIT.unshift({ts:new Date().toLocaleString('th'),userId:'demo',action:'ลบ',detail:b.name});
    return {ok:true};
  },
  importBoards: function(t, rows) {
    rows.forEach(function(r){ r.id='BM'+Date.now()+(_mockSeq++); MOCK_BOARDS.push(JSON.parse(JSON.stringify(r))); });
    return {ok:true, added:rows.length, errors:[]};
  },
  exportBoards: function(t, coopId) {
    var s = _mockGetSess(t);
    var d = s&&s.role==='admin' ? MOCK_BOARDS : MOCK_BOARDS.filter(function(b){return b.coopId===(s&&s.coopId);});
    if (coopId) d = d.filter(function(b){return b.coopId===coopId;});
    return {ok:true, data:JSON.parse(JSON.stringify(d))};
  },
  getUsers:   function(t){ return {ok:true, data:JSON.parse(JSON.stringify(MOCK_USERS))}; },
  addUser:    function(t, u){ u.id='U'+Date.now(); u.active=true; MOCK_USERS.push(JSON.parse(JSON.stringify(u))); return {ok:true}; },
  updateUser: function(t, u){ var i=MOCK_USERS.findIndex(function(x){return x.id===u.id;}); if(i>=0) MOCK_USERS[i]=Object.assign({},MOCK_USERS[i],u); return {ok:true}; },
  addCoop:    function(t, c){ MOCK_COOPS.push({id:c.id,name:c.name,type:c.type}); return {ok:true}; },
  getAuditLog:function(t, n){ return {ok:true, data:MOCK_AUDIT.slice(0,n||50)}; },
};

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  if (!u || !p) return;
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'กำลังเข้าสู่ระบบ...';
  GAS('login').withSuccessHandler(function(res) {
      btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
      if (res.ok) {
        token = res.token;
        currentUser = res.user;
        sessionStorage.setItem('token', token);

        showApp();
      } else {
        document.getElementById('loginErr').style.display = 'block';
        document.getElementById('loginErr').textContent = res.error;
      }
    }).withFailureHandler(function(err) {
      btn.disabled = false; btn.textContent = 'เข้าสู่ระบบ';
      showErr('เกิดข้อผิดพลาด: ' + err.message);

}

// ============================================================
//  LOGIC
// ============================================================
function calcYrs(dateIn, dateOut, dateInFirst, returnSelf) {
  // ถ้า returnSelf หรือมี dateInFirst → นับปีสะสมจากวันแรก
  var start = (returnSelf === 'TRUE' || returnSelf === true || dateInFirst)
    ? (dateInFirst || dateIn) : dateIn;
  var d1 = new Date(start), d2 = dateOut ? new Date(dateOut) : new Date();
  var ms = d2 - d1;
  return ms < 0 ? 0 : ms / (1000 * 60 * 60 * 24 * 365.25);
}

function termLabel(b) {
  // รองรับทั้ง termLabel(b) และ termLabel(number) สำหรับ backward compat
  if (typeof b === 'number') {
    var y = b;
    if (y < 1) return {lbl:'1/1', cls:'c11'};
    if (y < 2) return {lbl:'1/2', cls:'c12'};
    if (y < 3) return {lbl:'2/1', cls:'c21'};
    if (y < 4) return {lbl:'2/2', cls:'c22'};
    return {lbl:'>2/2', cls:'c22'};
  }
  var yrs      = calcYrs(b.dateIn, b.dateOut || '', b.dateInFirst || '', b.returnSelf || '');
  var yrsThis  = calcYrs(b.dateIn, b.dateOut || '', null, false);
  var isSub    = b.type === 'sub';
  var isReturn = (b.returnSelf === 'TRUE' || b.returnSelf === true);

  // กลับมาแทนตนเอง → วาระต่อเนื่องจากปีสะสม
  if (isReturn) {
    if (b.dateOut)  return {lbl:'พ้นตำแหน่ง', cls:'cbrk'};
    if (yrs < 1)    return {lbl:'วาระ 1/1', cls:'c11'};
    if (yrs < 2)    return {lbl:'วาระ 1/2', cls:'c12'};
    if (yrs < 3)    return {lbl:'วาระ 2/1', cls:'c21'};
    if (yrs < 4)    return {lbl:'วาระ 2/2', cls:'c22'};
    return {lbl:'เกิน 2 วาระ', cls:'c22'};
  }

  // ผู้แทน → ดูจาก origTermLabel + dateInFirst
  if (isSub) {
    if (!b.origTermLabel) return {lbl:'ผู้แทน', cls:'csub'};
    var isYear1  = (b.origTermLabel === '1/1' || b.origTermLabel === '2/1');
    var isVara1  = !b.dateInFirst; // ไม่มีประวัติก่อน = วาระ 1
    if (isVara1) return isYear1 ? {lbl:'วาระ 1/1', cls:'c11'} : {lbl:'วาระ 1/2', cls:'c12'};
    else         return isYear1 ? {lbl:'วาระ 2/1', cls:'c21'} : {lbl:'วาระ 2/2', cls:'c22'};
  }

  // ปกติ
  if (b.status === 'break') return {lbl:'เว้นวรรค', cls:'cbrk'};
  if (b.dateOut)            return {lbl:'พ้นตำแหน่ง', cls:'cbrk'};
  if (yrs < 1)  return {lbl:'วาระ 1/1', cls:'c11'};
  if (yrs < 2)  return {lbl:'วาระ 1/2', cls:'c12'};
  if (yrs < 3)  return {lbl:'วาระ 2/1', cls:'c21'};
  if (yrs < 4)  return {lbl:'วาระ 2/2', cls:'c22'};
  return {lbl:'เกิน 2 วาระ', cls:'c22'};
}

function checkBoard(b) {
  var yrs = calcYrs(b.dateIn, b.dateOut || '', b.dateInFirst || '', b.returnSelf || '');
  var issues = [], warns = [];
  var active = !b.dateOut && b.status !== 'break' && b.status !== 'resigned';

  if (active) {
    if (yrs >= 4) issues.push('ปีสะสมเกิน 4 ปีติดต่อกัน ต้องเว้นวรรค');
    else if (yrs >= 3) warns.push('ใกล้ครบวาระ (สะสม ' + yrs.toFixed(1) + ' ปี)');
    else if (yrs >= 2) warns.push('เข้าปีที่ 3 สะสม (' + yrs.toFixed(1) + ' ปี)');
  }

  // ตรวจสอบ eligibleDate — กรรมการที่พ้นในวาระที่ 2 ต้องเว้นวรรค
  if (b.dateOut && b.eligibleDate) {
    var today = new Date();
    var eligible = new Date(b.eligibleDate);
    if (today < eligible) {
      issues.push('ยังเว้นวรรคอยู่ สมัครได้ตั้งแต่ ' + b.eligibleDate);
    }
  }

  return { issues, warns, yrs };
}

// คำนวณ Eligible status สำหรับแสดงผล
function getEligible(b) {
  if (!b.dateOut) return { lbl: 'ดำรงตำแหน่งอยู่', cls: 'b-blue' };

  var yrs = calcYrs(b.dateIn, b.dateOut, b.dateInFirst || '', b.returnSelf || '');

  // พ้นในวาระที่ 1 (≤ 2 ปี) → สมัครได้ทันที
  if (yrs <= 2) return { lbl: '✓ สมัครได้ทันที', cls: 'b-ok' };

  // พ้นในวาระที่ 2 (> 2 ปี) → ต้องเว้นวรรค
  if (!b.eligibleDate) return { lbl: '⛔ ต้องเว้นวรรค (กรอก eligibleDate)', cls: 'b-bad' };

  var today = new Date();
  var eligible = new Date(b.eligibleDate);
  if (today >= eligible) {
    return { lbl: '✓ เว้นวรรคครบแล้ว สมัครได้', cls: 'b-ok' };
  } else {
    var diff = calcYrs(new Date().toISOString().slice(0,10), b.eligibleDate, '', '');
    return { lbl: '⛔ เว้นวรรคอยู่ อีก ' + Math.ceil(diff * 12) + ' เดือน', cls: 'b-bad' };
  }
}

function getCoopName(id) {
  const c = coopsData.find(x => x.id === String(id));
  return c ? c.name : id;
}

function renderDash() {
  const active = boardsData.filter(b => b.status === 'active').length;
  const bad = boardsData.filter(b => checkBoard(b).issues.length > 0).length;
  const warn = boardsData.filter(b => checkBoard(b).warns.length > 0).length;
  const brk = boardsData.filter(b => b.status === 'break').length;

  // update alert badge
  if (bad > 0) {
    const ab = document.getElementById('alertBadge');
    ab.style.display = 'inline'; ab.textContent = bad;
  }

  const coopCards = coopsData.map(c => {
    const cb = boardsData.filter(b => b.coopId === c.id);
    const ca = cb.filter(b => b.status === 'active').length;
    const cbad = cb.filter(b => checkBoard(b).issues.length > 0).length;
    const cwarn = cb.filter(b => checkBoard(b).warns.length > 0).length;
    const pct = Math.round((ca / 15) * 100);
    const barCol = ca >= 15 ? '#C62828' : ca >= 12 ? '#FF9800' : '#4CAF50';
    return `<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div>
          <div style="font-weight:600;font-size:13px">${c.name}</div>
          <div style="font-size:11px;color:#888">${c.type}</div>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${cbad > 0 ? `<span class="badge b-bad">⛔ ${cbad} คน</span>` : ''}
          ${cwarn > 0 ? `<span class="badge b-warn">⚠ ${cwarn} คน</span>` : ''}
          ${cbad === 0 && cwarn === 0 ? `<span class="badge b-ok">✓ ปกติ</span>` : ''}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="progress" style="flex:1"><div class="progress-fill" style="width:${pct}%;background:${barCol}"></div></div>
        <span style="font-size:12px;color:#666;white-space:nowrap">${ca} / 15 คน</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">สหกรณ์ในระบบ</div><div class="stat-value">${coopsData.length}</div></div>
      <div class="stat"><div class="stat-label">กรรมการดำรงตำแหน่ง</div><div class="stat-value ok">${active}</div></div>
      <div class="stat"><div class="stat-label">ขัดเงื่อนไข</div><div class="stat-value ${bad > 0 ? 'bad' : ''}">${bad}</div></div>
      <div class="stat"><div class="stat-label">ใกล้ครบวาระ</div><div class="stat-value ${warn > 0 ? 'warn' : ''}">${warn}</div></div>
      <div class="stat"><div class="stat-label">อยู่ช่วงเว้นวรรค</div><div class="stat-value">${brk}</div></div>
    </div>
    <div style="font-size:14px;font-weight:600;margin-bottom:10px">สถานะรายสหกรณ์</div>
    ${coopCards}`;
}

// ============================================================
//  BOARD
// ============================================================
function renderBoard() {
  let filtered = boardsData;
  if (boardSearch) filtered = filtered.filter(b => b.name.includes(boardSearch));
  if (boardCoopFilter) filtered = filtered.filter(b => b.coopId === boardCoopFilter);
  if (boardStatusFilter) filtered = filtered.filter(b => b.status === boardStatusFilter);

  const coopOpts = coopsData.map(c =>
    `<option value="${c.id}" ${boardCoopFilter === c.id ? 'selected' : ''}>${c.name}</option>`).join('');

  const rows = filtered.map((b, i) => {
    const {issues, warns, yrs} = checkBoard(b);
    let tChip = '';
    const t = termLabel(b);
    tChip = `<span class="chip ${t.cls}">${t.lbl}</span>`;
    const pct = Math.min(100, Math.round((yrs / 4) * 100));
    const barCol = yrs >= 4 ? '#C62828' : yrs >= 2 ? '#FF9800' : '#4CAF50';
    const chk = issues.length ? `<span class="badge b-bad">⛔ ขัดเงื่อนไข</span>` :
                warns.length  ? `<span class="badge b-warn">⚠ ใกล้ครบ</span>` :
                                `<span class="badge b-ok">✓ ปกติ</span>`;
    return `<tr>
      <td style="color:#999">${i + 1}</td>
      <td><div style="font-weight:600">${b.name}</div>
          <div style="font-size:11px;color:#888">${getCoopName(b.coopId)}</div></td>
      <td>${b.dateIn}</td>
      <td style="color:${b.dateOut ? '#1a1a1a' : '#999'}">${b.dateOut || '—'}</td>
      <td>${tChip} ${b.type === 'sub' ? '<span class="chip csub" style="margin-left:2px">แทน</span>' : ''}</td>
      <td><div style="font-size:11px;margin-bottom:3px">${yrs.toFixed(1)} ปี</div>
          <div class="progress" style="width:70px"><div class="progress-fill" style="width:${pct}%;background:${barCol}"></div></div></td>
      <td>${chk}</td>
      <td>
        <button class="btn btn-sm" onclick="openEditBoard('${b.id}')">แก้ไข</button>
        <button class="btn btn-sm btn-danger" style="margin-left:3px" onclick="confirmDeleteBoard('${b.id}')">ลบ</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="card-title">รายชื่อกรรมการ (${filtered.length} รายการ)</span>
        <button class="btn btn-primary" onclick="openAddBoard()">+ เพิ่มกรรมการ</button>
      </div>
      <div class="toolbar">
        <input type="text" class="search-input" placeholder="ค้นหาชื่อกรรมการ..." value="${boardSearch}"
          oninput="boardSearch=this.value;renderBoard()">
        ${currentUser.role === 'admin' ? `<select onchange="boardCoopFilter=this.value;renderBoard()" style="padding:7px 10px;border:1px solid #D0D0D0;border-radius:6px;font-size:13px">
          <option value="">ทุกสหกรณ์</option>${coopOpts}</select>` : ''}
        <select onchange="boardStatusFilter=this.value;renderBoard()" style="padding:7px 10px;border:1px solid #D0D0D0;border-radius:6px;font-size:13px">
          <option value="">ทุกสถานะ</option>
          <option value="active" ${boardStatusFilter==='active'?'selected':''}>ดำรงตำแหน่ง</option>
          <option value="break" ${boardStatusFilter==='break'?'selected':''}>เว้นวรรค</option>
          <option value="resigned" ${boardStatusFilter==='resigned'?'selected':''}>พ้นตำแหน่ง</option>
        </select>
        <button class="btn" onclick="loadBoards(renderBoard)">รีเฟรช</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>ชื่อ-สกุล / สหกรณ์</th><th>วันที่เข้า</th><th>วันที่ออก</th><th>วาระ</th><th>ปี (ความคืบหน้า)</th><th>ผลตรวจ</th><th>จัดการ</th></tr></thead>
          <tbody>${rows || `<tr><td colspan="8"><div class="empty">ไม่พบข้อมูล</div></td></tr>`}</tbody>
        </table>
      </div>
    </div>`;
}

function renderHistory() {
  let filtered = boardsData;
  if (histSearch) filtered = filtered.filter(b => b.name.includes(histSearch));
  const items = filtered.map(b => {
    const {issues, warns, yrs} = checkBoard(b);
    const dotCls = issues.length ? 'dot-bad' : warns.length ? 'dot-warn' : b.status === 'break' ? 'dot-gray' : 'dot-ok';
    const end = b.dateOut || 'ปัจจุบัน';
    const chk = issues.length ? `<span class="badge b-bad">⛔ ขัดเงื่อนไข</span>` :
                warns.length  ? `<span class="badge b-warn">⚠ ใกล้ครบ</span>` :
                b.status === 'break' ? `<span class="badge b-gray">เว้นวรรค</span>` :
                `<span class="badge b-ok">✓ ปกติ</span>`;
    return `<div class="timeline-item">
      <div class="timeline-dot ${dotCls}"></div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-weight:600">${b.name}</span>
          <span class="badge b-blue" style="font-size:10px">${getCoopName(b.coopId)}</span>

let importRows = [];

function readImportFile(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) { document.getElementById('importText').value = e.target.result; };
  reader.readAsText(file, 'UTF-8');
}

function previewImport() {
  const txt = document.getElementById('importText').value.trim();
  const lines = txt.split('\n').filter(l => l.trim() && !l.toLowerCase().startsWith('coopid'));
  importRows = [];
  if (!lines.length) {
    document.getElementById('importPreview').innerHTML = `<div class="alert alert-warn"><span>⚠</span><div>ไม่พบข้อมูล</div></div>`;
    return;
  }
  const rows = lines.map((l, i) => {
    const p = l.split(',').map(x => x.replace(/"/g, '').trim());
    const [coopId, name, dateIn, dateOut, status, type, origDate, note] = p;
    const validCoop = coopsData.find(c => c.id === coopId);
    const ok = coopId && name && dateIn && validCoop;
    if (ok) importRows.push({ coopId, name, dateIn, dateOut: dateOut || '', status: status || 'active', type: type || 'normal', origDate: origDate || '', note: note || '' });
    return `<tr><td>${i + 1}</td><td>${name || '—'}</td><td>${coopId || '—'}</td><td>${dateIn || '—'}</td>
      <td><span class="badge ${ok ? 'b-ok' : 'b-bad'}">${ok ? 'ตรงรูปแบบ' : 'ข้อมูลไม่ถูกต้อง'}</span></td></tr>`;
  }).join('');
  document.getElementById('importPreview').innerHTML = `
    <div style="font-size:12px;color:#555;margin-bottom:6px">พบ ${importRows.length} แถวที่นำเข้าได้ (จาก ${lines.length} แถว)</div>
    <div class="table-wrap"><table>
      <thead><tr><th>#</th><th>ชื่อ</th><th>สหกรณ์</th><th>วันที่เข้า</th><th>สถานะ</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function confirmImport() {
  if (!importRows.length) { showErr('กรุณา Preview ก่อน หรือไม่มีข้อมูลที่ตรงรูปแบบ'); return; }
  GAS('importBoards').withSuccessHandler(function(res) {
    if (res.ok) {
      showOk(`นำเข้าสำเร็จ ${res.added} รายการ` + (res.errors.length ? ` (ข้ามไป ${res.errors.length})` : ''));
      importRows = [];
      document.getElementById('importText').value = '';
      document.getElementById('importPreview').innerHTML = '';
      loadBoards(function(){});
    } else showErr(res.error);
  }).call(token, importRows);
}

function doExport() {
  const coopId = document.getElementById('exportCoop').value;
  const fmt = document.getElementById('exportFmt').value;
  GAS('exportBoards').withSuccessHandler(function(res) {
    if (!res.ok) { showErr(res.error); return; }
    let content, filename, mime;
    if (fmt === 'csv') {
      const header = 'coopId,coopName,name,dateIn,dateOut,status,type,origDate,note,years,termLabel,checkResult';
      const rows = res.data.map(b => {
        const {issues, warns, yrs} = checkBoard(b);
        const t = b.status === 'break' ? 'เว้นวรรค' : b.type === 'sub' ? 'ผู้แทน' : termLabel(b).lbl;
        const chk = issues.length ? 'ขัดเงื่อนไข' : warns.length ? 'ใกล้ครบวาระ' : 'ปกติ';
        return [b.coopId, getCoopName(b.coopId), b.name, b.dateIn, b.dateOut, b.status, b.type, b.origDate, b.note, yrs.toFixed(2), t, chk].map(v => `"${v}"`).call(',');
      });
      content = '\ufeff' + [header, ...rows].join('\n');
      filename = 'board_export_' + new Date().toISOString().slice(0, 10) + '.csv';
      mime = 'text/csv;charset=utf-8';
    } else {
      content = JSON.stringify(res.data, null, 2);
      filename = 'board_export_' + new Date().toISOString().slice(0, 10) + '.json';
      mime = 'application/json';
    }
    const blob = new Blob([content], { type: mime });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    showOk('Export สำเร็จ ' + res.data.length + ' รายการ');
  }).exportBoards(token, coopId);
}

        <option value="1/2" ${b.origTermLabel==='1/2'?'selected':''}>1/2</option>
        <option value="2/1" ${b.origTermLabel==='2/1'?'selected':''}>2/1</option>
        <option value="2/2" ${b.origTermLabel==='2/2'?'selected':''}>2/2</option>
      </select></div>
    <div class="form-group"><label>วันที่เริ่มนับรวม</label><input type="date" id="mDateInFirst" value="${b.dateInFirst || ''}"></div></div>
    <div class="form-row one"><div class="form-group"><label>
      <input type="checkbox" id="mReturnSelf" ${b.returnSelf==='TRUE'?'checked':''} style="margin-right:6px">
      กลับมาแทนตำแหน่งตนเอง (วาระต่อเนื่อง)
    </label></div></div>
    <div class="form-row one"><div class="form-group">
      <label>วันที่สมัครได้ (eligibleDate) — กรอกเฉพาะกรณีพ้นในวาระที่ 2 ต้องเว้นวรรค</label>
      <input type="date" id="mEligibleDate" value="${b.eligibleDate || ''}">
    </div></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveEditBoard('${b.id}')">บันทึก</button>
    </div>`);
}

function saveEditBoard(id) {
  const board = {
    id,
    coopId:        document.getElementById('mCoop').value,
    name:          document.getElementById('mName').value.trim(),
    dateIn:        document.getElementById('mDateIn').value,
    dateOut:       document.getElementById('mDateOut').value,
    status:        document.getElementById('mStatus').value,
    type:          document.getElementById('mType').value,
    origDate:      document.getElementById('mOrigDate').value,
    note:          document.getElementById('mNote').value.trim(),
    origTermLabel: document.getElementById('mOrigTermLabel').value,
    dateInFirst:   document.getElementById('mDateInFirst').value,
    returnSelf:    document.getElementById('mReturnSelf').checked ? 'TRUE' : '',
    eligibleDate:  document.getElementById('mEligibleDate').value,
  };
  GAS('updateBoard').withSuccessHandler(function(res) {
    if (res.ok) { closeModal(); showOk('บันทึกสำเร็จ'); loadBoards(renderBoard); }
    else showErr(res.error);
  }).call(token, board);
}

function confirmDeleteBoard(id) {
  const b = boardsData.find(x => x.id === String(id));
  if (!b) return;
  openModal(`<div class="modal-title">ยืนยันการลบ</div>
    <p style="margin-bottom:16px">ต้องการลบ <strong>${b.name}</strong> ออกจากระบบ?<br>การลบไม่สามารถกู้คืนได้</p>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-danger" onclick="doDeleteBoard('${id}')">ลบ</button>
    </div>`);
}

function doDeleteBoard(id) {
  GAS('deleteBoard').withSuccessHandler(function(res) {
    if (res.ok) { closeModal(); showOk('ลบสำเร็จ'); loadBoards(renderBoard); }
    else showErr(res.error);
  }).call(token, id);
}

// ============================================================
//  USER MODALS
// ============================================================
function openAddUser() {
  const coopOpts = coopsData.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  openModal(`<div class="modal-title">เพิ่มผู้ใช้งาน</div>
    <div class="form-row"><div class="form-group"><label>ชื่อ-สกุล *</label><input type="text" id="uName"></div>
    <div class="form-group"><label>username *</label><input type="text" id="uUser"></div></div>
    <div class="form-row"><div class="form-group"><label>รหัสผ่าน *</label><input type="password" id="uPass"></div>
    <div class="form-group"><label>สิทธิ์</label><select id="uRole">
      <option value="officer">เจ้าหน้าที่</option><option value="admin">Admin</option>
    </select></div></div>
    <div class="form-row one"><div class="form-group"><label>สหกรณ์ที่รับผิดชอบ (เจ้าหน้าที่)</label>
      <select id="uCoop"><option value="">— ทุกสหกรณ์ (Admin) —</option>${coopOpts}</select></div></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveAddUser()">บันทึก</button>
    </div>`);
}

function saveAddUser() {
  const user = {
    username: document.getElementById('uUser').value.trim(),
    password: document.getElementById('uPass').value,
    name:     document.getElementById('uName').value.trim(),
    role:     document.getElementById('uRole').value,
    coopId:   document.getElementById('uCoop').value,
  };
  if (!user.username || !user.password || !user.name) { showErr('กรุณากรอกข้อมูลให้ครบ'); return; }
  GAS('addUser').withSuccessHandler(function(res) {
    if (res.ok) { closeModal(); showOk('เพิ่มผู้ใช้สำเร็จ'); renderUsers(); }
    else showErr(res.error);
  }).call(token, user);
}

function openEditUser(u) {
  const coopOpts = coopsData.map(c => `<option value="${c.id}" ${c.id === u.coopId ? 'selected' : ''}>${c.name}</option>`).join('');
  openModal(`<div class="modal-title">แก้ไขผู้ใช้ — ${u.name}</div>
    <div class="form-row"><div class="form-group"><label>ชื่อ-สกุล</label><input type="text" id="uName" value="${u.name}"></div>
    <div class="form-group"><label>username</label><input type="text" id="uUser" value="${u.username}"></div></div>
    <div class="form-row"><div class="form-group"><label>รหัสผ่านใหม่ (ว่าง = ไม่เปลี่ยน)</label><input type="password" id="uPass"></div>
    <div class="form-group"><label>สิทธิ์</label><select id="uRole">
      <option value="officer" ${u.role==='officer'?'selected':''}>เจ้าหน้าที่</option>
      <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
    </select></div></div>
    <div class="form-row"><div class="form-group"><label>สหกรณ์</label>
      <select id="uCoop"><option value="">— ทุกสหกรณ์ —</option>${coopOpts}</select></div>
    <div class="form-group"><label>สถานะ</label><select id="uActive">
      <option value="1" ${u.active?'selected':''}>ใช้งาน</option>
      <option value="0" ${!u.active?'selected':''}>ปิดใช้งาน</option>
    </select></div></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveEditUser('${u.id}')">บันทึก</button>
    </div>`);
}

function saveEditUser(id) {
  const user = {
    id,
    username: document.getElementById('uUser').value.trim(),
    password: document.getElementById('uPass').value,
    name:     document.getElementById('uName').value.trim(),
    role:     document.getElementById('uRole').value,
    coopId:   document.getElementById('uCoop').value,
    active:   document.getElementById('uActive').value === '1',
  };
  GAS('updateUser').withSuccessHandler(function(res) {
    if (res.ok) { closeModal(); showOk('บันทึกสำเร็จ'); renderUsers(); }
    else showErr(res.error);
  }).call(token, user);
}

// ============================================================
//  COOP MODAL
// ============================================================
function openAddCoop() {
  openModal(`<div class="modal-title">เพิ่มสหกรณ์ใหม่</div>
    <div class="form-row"><div class="form-group"><label>รหัสสหกรณ์ *</label><input type="text" id="cId" placeholder="C04"></div>
    <div class="form-group"><label>ประเภทสหกรณ์</label><select id="cType">
      <option>เกษตร</option><option>ออมทรัพย์</option><option>บริการ</option>
      <option>ประมง</option><option>นิคม</option><option>ร้านค้า</option><option>อื่นๆ</option>
    </select></div></div>
    <div class="form-row one"><div class="form-group"><label>ชื่อสหกรณ์ *</label><input type="text" id="cName" placeholder="สหกรณ์..."></div></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="saveAddCoop()">บันทึก</button>
    </div>`);
}

function saveAddCoop() {
  const coop = {
    id:   document.getElementById('cId').value.trim().toUpperCase(),
    name: document.getElementById('cName').value.trim(),
    type: document.getElementById('cType').value,
  };
  if (!coop.id || !coop.name) { showErr('กรุณากรอกข้อมูล'); return; }
  GAS('getCoops').withSuccessHandler(function(res) {
    if (res.ok) {
      closeModal(); showOk('เพิ่มสหกรณ์สำเร็จ');
      GAS('getCoops').withSuccessHandler(function(r) { if (r.ok) { coopsData = r.data; renderCoops(); } }).call(token);
    } else showErr(res.error);
  }).addCoop(token, coop);
}

// ============================================================
//  MODAL HELPERS
// ============================================================
function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalBackdrop').classList.add('show');
}
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('show');
}
document.getElementById('modalBackdrop').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============================================================
//  TOAST
// ============================================================
function showOk(msg) { showToast(msg, '#2E7D32'); }
function showErr(msg) { showToast(msg, '#C62828'); }
function showToast(msg, bg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = bg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
